[package]
name = "oath-keeper"
version = "0.1.0"
edition = "2018"
description = "CLI for Oath Keeper — an agent that keeps its word"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = "0.4"
ratatui = "0.30.2"
crossterm = "0.29.0"

[[bin]]
name = "oath-keeper"
path = "src/main.rs"
