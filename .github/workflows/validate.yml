name: Validate

on:
  pull_request:
    paths:
      - "packages/**"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/**"
      - ".github/CODEOWNERS"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate mod packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        # Some packages in the monorepo use bun as their test
        # runtime (e.g. muscle-memory's `bun test test/`). Setup Bun
        # unconditionally — it's a no-op for packages that don't
        # use it, and the ~5s install is cheaper than per-package
        # detection logic.
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Validate manifests
        run: npm run validate

      # Per-package test + typecheck. Runs only for packages whose
      # package.json declares a `test` or `typecheck` script. The intent
      # is to catch regressions in the same CI run that gates publish,
      # not to require every package to have tests today.
      - name: Install deps for packages with tests
        run: |
          for pkg in packages/*/; do
            if [ -f "$pkg/package.json" ] && grep -q '"test"\|"typecheck"' "$pkg/package.json"; then
              echo "Installing in $(basename "$pkg")"
              (cd "$pkg" && npm install --no-audit --no-fund || exit 1)
            fi
          done

      - name: Run typecheck for changed packages
        run: |
          failed=0
          for pkg in packages/*/; do
            if [ -f "$pkg/package.json" ] && grep -q '"typecheck"' "$pkg/package.json"; then
              echo "typecheck: $(basename "$pkg")"
              if ! (cd "$pkg" && npm run typecheck); then
                failed=1
              fi
            fi
          done
          exit $failed

      - name: Run tests for changed packages
        run: |
          failed=0
          for pkg in packages/*/; do
            if [ -f "$pkg/package.json" ] && grep -q '"test"' "$pkg/package.json"; then
              echo "test: $(basename "$pkg")"
              if ! (cd "$pkg" && npm test); then
                failed=1
              fi
            fi
          done
          exit $failed
